<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masuk - House Recommender AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root { --primary: #2563eb; --primary-dark: #1d4ed8; --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #e8edf5 50%, #f5f0ff 100%); --radius: 1.15rem; --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    body { background: var(--bg-gradient); font-family: var(--font-sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.6); border-radius: var(--radius); box-shadow: 0 8px 32px rgba(15,23,42,0.08); padding: 2.5rem; width: 100%; max-width: 420px; }
    .auth-logo { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), #7c3aed); border-radius: 0.75rem; font-size: 1.4rem; color: #fff; margin-bottom: 1rem; }
    .form-control { border: 1.5px solid #e2e8f0; border-radius: 0.5rem; padding: 0.6rem 0.85rem; font-size: 0.92rem; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 0.5rem; padding: 0.6rem 1.75rem; font-weight: 600; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.35); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo mx-auto"><i class="bi bi-house-heart-fill"></i></div>
      <h1 class="h4 fw-bold mb-1">Selamat Datang</h1>
      <p class="text-muted small mb-0">Masuk ke House Recommender AI</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Username</label>
        <input name="username" class="form-control" placeholder="Masukkan username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Masukkan password" required>
      </div>
      <button class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Masuk</button>
    </form>
    <p class="text-center text-muted small mt-4 mb-0">
      Belum punya akun? <a href="{{ url_for('register') }}" class="fw-semibold">Daftar</a>
    </p>
  </div>
</body>
</html>
